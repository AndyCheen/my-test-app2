version: '3.8'
services:
  php:
    build: .
    volumes:
      - .:/app
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: yii2app
      POSTGRES_USER: yii
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
